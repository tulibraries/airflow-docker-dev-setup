services:
  redis:
    image: redis:latest

  postgres:
    image: postgres:16
    environment:
        - POSTGRES_USER=airflow
        - POSTGRES_PASSWORD=airflow
        - POSTGRES_DB=airflow

  api-server:
    build: .
    restart: always
    depends_on:
        - postgres
    environment:
        - AIRFLOW__CORE__LOAD_EXAMPLES=False
        - AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS=False
        - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
        - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
        - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
        - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
        - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
        - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/1
        - AIRFLOW__API__SECRET_KEY=Ud+K7/gXg+IWP5F9HjsqXw==
        - LOAD_EX=n
    env_file:
        - ../local.env
    volumes:
        - ../${DAG_DIR}/${DAG_DIR}:/opt/airflow/dags/${DAG_DIR}
        - ./data:/opt/airflow/data
        - ./docker-requirements.txt:/app/requirements.txt
        - ./bin/start.sh:/usr/bin/start.sh

    ports:
        - "8010:8080"

    entrypoint: /usr/bin/start.sh
    healthcheck:
        test: ["CMD-SHELL", "python -c \"import socket; s = socket.create_connection(('127.0.0.1', 8080), 2); s.close()\""]
        interval: 10s
        timeout: 20s
        retries: 3

  flower:
    image: apache/airflow:3.1.8-python3.12
    restart: always
    depends_on:
        - redis
        - api-server
    environment:
        - AIRFLOW__CORE__LOAD_EXAMPLES=False
        - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
        - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
        - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
        - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
        - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
        - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/1
        - AIRFLOW__API__SECRET_KEY=Ud+K7/gXg+IWP5F9HjsqXw==
        - LOAD_EX=n
    ports:
        - "5555:5555"
    command: celery flower
    volumes:
        - ./docker-requirements.txt:/app/requirements.txt
  scheduler:
    build: .
    restart: always
    depends_on:
        - api-server
    volumes:
        - ../${DAG_DIR}/${DAG_DIR}:/opt/airflow/dags/${DAG_DIR}
        - ./data:/opt/airflow/data
        - ./docker-requirements.txt:/app/requirements.txt
    env_file:
        - ../local.env
    environment:
        - AIRFLOW__CORE__LOAD_EXAMPLES=False
        - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
        - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
        - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
        - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
        - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/1
        - AIRFLOW__API__SECRET_KEY=Ud+K7/gXg+IWP5F9HjsqXw==
        - LOAD_EX=n
    command: scheduler

  dag-processor:
    build: .
    restart: always
    depends_on:
        - api-server
    volumes:
        - ../${DAG_DIR}/${DAG_DIR}:/opt/airflow/dags/${DAG_DIR}
        - ./data:/opt/airflow/data
        - ./docker-requirements.txt:/app/requirements.txt
    env_file:
        - ../local.env
    environment:
        - AIRFLOW__CORE__LOAD_EXAMPLES=False
        - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
        - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
        - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
        - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
        - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
        - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/1
        - AIRFLOW__API__SECRET_KEY=Ud+K7/gXg+IWP5F9HjsqXw==
        - LOAD_EX=n
    command: dag-processor

  triggerer:
    build: .
    restart: always
    depends_on:
        - api-server
    volumes:
        - ../${DAG_DIR}/${DAG_DIR}:/opt/airflow/dags/${DAG_DIR}
        - ./data:/opt/airflow/data
        - ./docker-requirements.txt:/app/requirements.txt
    env_file:
        - ../local.env
    environment:
        - AIRFLOW__CORE__LOAD_EXAMPLES=False
        - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
        - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
        - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
        - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
        - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
        - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/1
        - AIRFLOW__API__SECRET_KEY=Ud+K7/gXg+IWP5F9HjsqXw==
        - LOAD_EX=n
    command: triggerer

  worker:
    build:
      context: .
      dockerfile: ./Dockerfile
    hostname: worker
    restart: always
    depends_on:
        - scheduler
    volumes:
        - ../${DAG_DIR}/${DAG_DIR}:/opt/airflow/dags/${DAG_DIR}
        - ./data:/opt/airflow/data
        - ./docker-requirements.txt:/app/requirements.txt
        - ./worker/.bashrc:/opt/airflow/.bashrc
    env_file:
        - ../local.env
    environment:
        - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
        - AIRFLOW__CORE__HOSTNAME_CALLABLE=socket.gethostname
        - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
        - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
        - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
        - GITHUB_TOKEN=${GITHUB_TOKEN}
        - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
        - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/1
        - AIRFLOW__API__SECRET_KEY=Ud+K7/gXg+IWP5F9HjsqXw==
        - LOAD_EX=n
    command: celery worker
